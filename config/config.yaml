clusters:
  - name: "production Steering etcd"
    endpoints:
      - "https://172.22.8.60:12379"
      - "https://172.22.16.60:12379"
      - "https://172.22.144.60:12379"
    auth:
      type: mtls
      cacert: /certs/ca.pem
      cert: /certs/client.pem
      key: /certs/client-key.pem

